<!doctype html>
<html lang="zh_cn">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>测试react框架</title>
  <script src="../bundle/babel.min.js"></script>

  <style>
    .red {
      color: red;
      font-size: 20px;
    }

    .box {
      width: 100px;
      height: 100px;
      border: 1px solid red;
      border-radius: 3px;
    }

    .green {
      color: green;
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel" async>
    const { memo, useState, useCallback, useEffect, useReducer, useRef, useMemo, map, cloneElement, createContext, useOptimistic, useContext, useSyncExternalStore } = React;

    const AppStoreContext = createContext();

    function useAppStore() {
      const store = useContext(AppStoreContext);
      if (!store) {
        throw new ReferenceError('useAppState/useSetAppState cannot be called outside of an <AppStateProvider />');
      }
      return store;
    }

    function useAppState(selector) {
      const store = useAppStore();

      const get = () => {
        const state = store.getState?.();
        const selected = selector(state || {});

        return selected;
      };

      return useSyncExternalStore(store.subscribe || (() => { }), get, get);
    }

    const B = ({ count }) => {
      if (count === 0) return <span>b</span>

      const [bState, setBState] = useState(0);

      return <div>
        b state: {bState}
        <button onClick={() => setBState(i => i + 1)}>add</button>
      </div>

      return (
        <div className="box green" ref={(r) => console.log("B ref", r)}>
          B
        </div>
      );
    };

    const C = () => {
      const foo = useAppState(s => s?.foo);

      useState();

      const toolPermissionContext = useAppState(s => s.toolPermissionContext);
      const verbose = useAppState(s => s.verbose);
      const mcp = useAppState(s => s.mcp);
      const plugins = useAppState(s => s.plugins);
      useRef();
      useCallback(() => {}, [])
      const agentDefinitions = useAppState(s => s.agentDefinitions);
      const fileHistory = useAppState(s => s.fileHistory);
      const initialMessage = useAppState(s => s.initialMessage);
      // const queuedCommands = useCommandQueue();
      // feature() is a build-time constant — dead code elimination removes the hook
      // call entirely in external builds, so this is safe despite looking conditional.
      // These fields contain excluded strings that must not appear in external builds.
      const spinnerTip = useAppState(s => s.spinnerTip);
      const showExpandedTodos = useAppState(s => s.expandedView) === 'tasks';
      const pendingWorkerRequest = useAppState(s => s.pendingWorkerRequest);
      const pendingSandboxRequest = useAppState(s => s.pendingSandboxRequest);
      const teamContext = useAppState(s => s.teamContext);
      const tasks = useAppState(s => s.tasks);
      const workerSandboxPermissions = useAppState(s => s.workerSandboxPermissions);
      const elicitation = useAppState(s => s.elicitation);
      const ultraplanPendingChoice = useAppState(s => s.ultraplanPendingChoice);
      const ultraplanLaunchPending = useAppState(s => s.ultraplanLaunchPending);
      const viewingAgentTaskId = useAppState(s => s.viewingAgentTaskId);
      // const setAppState = useSetAppState();

      return null;
    }

    const A = () => {
      const [c, setC] = useState(0);



      return (
        <div className="red" ref={(r) => console.log("a ref", r)}>
          A count {c}
          <button onClick={() => setC(i => i + 1)}>add a</button>
          <B count={c} />
          <AppStoreContext value={{}}>
            <C />
          </AppStoreContext>
        </div>
      );
    };

    const container = document.getElementById("root");
    // ReactDOM.render(<A />, container);

    ReactDOM.createRoot(container).render(<A />);
  </script>
</body>

</html>
